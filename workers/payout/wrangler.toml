name = "yabbai-payout"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Plain vars (safe to commit):
[vars]
SOLANA_RPC_URL = "https://api.mainnet-beta.solana.com"
MAX_WITHDRAW_SOL = "25"
# Optional: same base58 pubkey the static app uses (meta / window override, else DEFAULT_TREASURY in yabbai/index.html).
# If set, Worker GET shows treasuryMatchesEnv; POST refuses payout when TREASURY_SECRET_KEY's pubkey ≠ this value.
# YABBAI_TREASURY_RECEIVER = "2DarZ9hCi5PirKsDsnriewZEGqaz6Q11pEitoZJxBsYM"

# Secrets (never commit):
#   cd workers/payout && npx wrangler secret put TREASURY_SECRET_KEY
# Paste base58-encoded 64-byte secret key (same format as Phantom export / solana-keygen).
# That keypair's PUBLIC address must match the site's deposit receiver and optional var above.
