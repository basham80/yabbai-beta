name = "yabbai-balance-api"
main = "src/worker.js"
compatibility_date = "2024-09-23"

# Optional D1: run `wrangler d1 create yabbai-balance`, paste database_id, then add:
# [[d1_databases]]
# binding = "DB"
# database_name = "yabbai-balance"
# database_id = "YOUR_ID"
# Then: `wrangler d1 migrations apply yabbai-balance --remote` from this folder.

[vars]
SOLANA_RPC_URL = "https://api.mainnet-beta.solana.com"
